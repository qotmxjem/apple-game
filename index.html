<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>사과게임 — 합쳐서 10!</title>
<style>
  :root {
    --navy: #2e3a59;
    --navy-dark: #1f2840;
    --blue: #7b8fc7;
    --blue-light: #aebcdf;
    --cream: #fdfbf7;
    --pink: #e8a7b8;
    --good: #6fcf97;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    background: linear-gradient(160deg, #dfe6f5 0%, #f3eef7 50%, #e8eef9 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .wrap { display: flex; gap: 20px; align-items: flex-end; max-width: 100%; }

  .game-panel {
    background: var(--cream);
    border: 3px solid var(--navy);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 10px 30px rgba(46,58,89,.25);
  }
  .hud {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 12px;
  }
  .hud .title { font-size: 20px; font-weight: 800; color: var(--navy); }
  .hud .title small { font-weight: 500; color: var(--blue); font-size: 12px; }
  .score-box {
    margin-left: auto;
    background: var(--navy); color: #fff;
    padding: 6px 16px; border-radius: 999px;
    font-size: 18px; font-weight: 700;
    min-width: 110px; text-align: center;
  }
  button.restart {
    background: var(--pink); border: 2px solid var(--navy);
    color: var(--navy); font-weight: 700;
    padding: 6px 14px; border-radius: 999px;
    cursor: pointer; font-size: 14px;
  }
  button.restart:hover { filter: brightness(1.05); }

  #board { display: block; border-radius: 10px; touch-action: none; cursor: crosshair; }

  .timer-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .timer-track {
    flex: 1; height: 14px; border-radius: 999px;
    background: #e3e0da; border: 2px solid var(--navy);
    overflow: hidden;
  }
  .timer-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, var(--blue), var(--pink));
    border-radius: 999px;
    transition: width .2s linear;
  }
  .timer-label { font-weight: 700; color: var(--navy); width: 48px; text-align: right; }

  .chara-panel {
    width: 230px; display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .bubble {
    background: #fff; border: 3px solid var(--navy);
    border-radius: 16px; padding: 10px 14px;
    font-weight: 700; color: var(--navy); font-size: 15px;
    text-align: center; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px; width: 100%;
    position: relative;
  }
  .bubble::after {
    content: ""; position: absolute; bottom: -12px; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: var(--navy);
  }
  .chara-img {
    width: 200px; pointer-events: none;
    filter: drop-shadow(0 8px 16px rgba(46,58,89,.3));
    transition: transform .15s ease;
  }
  .chara-img.happy { animation: hop .4s ease; }
  .chara-img.sad   { animation: shake .3s ease; }
  @keyframes hop   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  .overlay {
    position: absolute; inset: 0;
    background: rgba(46,58,89,.55);
    border-radius: 15px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: #fff; z-index: 5;
  }
  .overlay h2 { font-size: 30px; }
  .overlay .final { font-size: 46px; font-weight: 800; color: #ffe3a3; }
  .overlay button {
    background: var(--pink); border: 3px solid #fff; color: var(--navy);
    font-size: 18px; font-weight: 800; padding: 10px 28px;
    border-radius: 999px; cursor: pointer;
  }
  .board-holder { position: relative; }
  .hidden { display: none !important; }

  /* mobile: stack vertically, board scales to screen width */
  @media (max-width: 900px) {
    body { padding: 8px; align-items: flex-start; }
    .wrap { flex-direction: column; align-items: center; gap: 10px; width: 100%; }
    .game-panel { padding: 10px; width: 100%; }
    .hud { gap: 8px; margin-bottom: 8px; }
    .hud .title { font-size: 15px; }
    .hud .title small { font-size: 10px; }
    .score-box { font-size: 15px; min-width: 86px; padding: 5px 12px; }
    button.restart { font-size: 12px; padding: 5px 10px; }
    .chara-panel {
      width: 100%; flex-direction: row; align-items: center;
      justify-content: center; gap: 10px;
    }
    .bubble { margin-bottom: 0; flex: 1; max-width: 260px; font-size: 13px; }
    .bubble::after {
      bottom: auto; left: auto; right: -12px; top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent; border-left-color: var(--navy);
    }
    .chara-img { width: 110px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="game-panel">
    <div class="hud">
      <div class="title">사과게임<br><small>드래그해서 합이 10이 되면 사라져요!</small></div>
      <div class="score-box">점수 <span id="score">0</span></div>
      <button class="restart" id="btnRestart">다시하기</button>
    </div>
    <div class="board-holder">
      <canvas id="board"></canvas>
      <div class="overlay hidden" id="overlay">
        <h2>게임 종료!</h2>
        <div class="final"><span id="finalScore">0</span>점</div>
        <button id="btnAgain">한 번 더!</button>
      </div>
    </div>
    <div class="timer-row">
      <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
      <div class="timer-label" id="timerLabel">120</div>
    </div>
  </div>

  <div class="chara-panel">

  const scoreEl = document.getElementById('score');
  const timerFill = document.getElementById('timerFill');
  const timerLabel = document.getElementById('timerLabel');
  const overlay = document.getElementById('overlay');
  const finalScoreEl = document.getElementById('finalScore');
  const bubble = document.getElementById('bubble');
  const chara = document.getElementById('chara');

  let grid, score, timeLeft, timerId, running = false;
  let drag = null;            // {x0,y0,x1,y1}
  let pops = [];              // pop animations {col,row,val,t}

  const CHEERS = ['나이스~!', '좋아요!', '잘한다 잘한다!', '천재인가...?', '우와아!', '그거야 그거!'];
  const BIG_CHEERS = ['대박!! 한꺼번에!', '엄청나잖아!?', '최고야!!'];

  function newGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) row.push(1 + Math.floor(Math.random() * 9));
      grid.push(row);
    }
  }

  function say(text, mood) {
    bubble.textContent = text;
    if (mood) {
      chara.classList.remove('happy', 'sad');
      void chara.offsetWidth;            // restart animation
      chara.classList.add(mood);
    }
  }

  function cellCenter(c, r) {
    return { x: PAD + c * CELL + CELL / 2, y: PAD + r * CELL + CELL / 2 };
  }

  function selectedCells() {
    if (!drag) return [];
    const x0 = Math.min(drag.x0, drag.x1), x1 = Math.max(drag.x0, drag.x1);
    const y0 = Math.min(drag.y0, drag.y1), y1 = Math.max(drag.y0, drag.y1);
    const cells = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] === 0) continue;
        const p = cellCenter(c, r);
        if (p.x >= x0 && p.x <= x1 && p.y >= y0 && p.y <= y1) cells.push({ c, r });
      }
    return cells;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // board background
    ctx.fillStyle = '#eef2fb';
    roundRect(0, 0, W, H, 10); ctx.fill();

    const sel = selectedCells();
    const sum = sel.reduce((s, p) => s + grid[p.r][p.c], 0);
    const selSet = new Set(sel.map(p => p.r + ',' + p.c));
    const good = sum === 10;

    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        const v = grid[r][c];
        if (v === 0) continue;
        const p = cellCenter(c, r);
        const isSel = selSet.has(r + ',' + c);
        drawApple(p.x, p.y, v, isSel, good);
      }

    // pop animations
    pops = pops.filter(a => a.t < 1);
    for (const a of pops) {
      const p = cellCenter(a.col, a.row);
      const s = 1 + a.t * 0.8;
      ctx.save();
      ctx.globalAlpha = 1 - a.t;
      ctx.translate(p.x, p.y - a.t * 30);
      ctx.scale(s, s);
      drawFaceCircle(0, 0, CELL * 0.42);
      ctx.restore();
      a.t += 0.06;
    }

    // selection rectangle
    if (drag) {
      const x0 = Math.min(drag.x0, drag.x1), x1 = Math.max(drag.x0, drag.x1);
      const y0 = Math.min(drag.y0, drag.y1), y1 = Math.max(drag.y0, drag.y1);
      ctx.strokeStyle = good ? '#27ae60' : '#2e3a59';
      ctx.fillStyle = good ? 'rgba(111,207,151,.18)' : 'rgba(123,143,199,.15)';
      ctx.lineWidth = 2.5;
      ctx.setLineDash(good ? [] : [6, 4]);
      ctx.beginPath(); ctx.rect(x0, y0, x1 - x0, y1 - y0);
      ctx.fill(); ctx.stroke();
      ctx.setLineDash([]);
      // live sum tag
      if (sel.length) {
        ctx.fillStyle = good ? '#27ae60' : '#2e3a59';
        ctx.beginPath(); ctx.arc(x1, y0, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(sum, x1, y0 + 1);
      }
    }

    if (pops.length) requestAnimationFrame(draw);
  }

  function drawFaceCircle(x, y, rad) {
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.clip();
    if (faceImg.complete && faceImg.naturalWidth) {
      ctx.drawImage(faceImg, x - rad, y - rad, rad * 2, rad * 2);
    } else {
      ctx.fillStyle = '#aebcdf'; ctx.fill();
    }
    ctx.restore();
  }

  function drawApple(x, y, v, isSel, good) {
    const rad = CELL * 0.40;
    // calm solid body, gentle highlight when selected
    ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fillStyle = isSel ? (good ? '#6fbf8f' : '#9db0de') : '#8b9dcd';
    ctx.fill();
    ctx.lineWidth = isSel ? 2.5 : 1.5;
    ctx.strokeStyle = isSel ? (good ? '#3e8e63' : '#5a6fa8') : 'rgba(46,58,89,.35)';
    ctx.stroke();
    // big readable number
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 19px "Segoe UI", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(v, x, y + 1);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function pos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    const sx = W / rect.width, sy = H / rect.height;
    return {
      x: Math.max(0, Math.min(W, (t.clientX - rect.left) * sx)),
      y: Math.max(0, Math.min(H, (t.clientY - rect.top) * sy))
    };
  }

  function onDown(e) {
    if (!running) return;
    e.preventDefault();
    const p = pos(e);
    drag = { x0: p.x, y0: p.y, x1: p.x, y1: p.y };
    draw();
  }
  function onMove(e) {
    if (!drag) return;
    e.preventDefault();
    const p = pos(e);
    drag.x1 = p.x; drag.y1 = p.y;
    draw();
  }
  function onUp() {
    if (!drag) return;
    const sel = selectedCells();
    const sum = sel.reduce((s, p) => s + grid[p.r][p.c], 0);
    if (sum === 10 && sel.length > 0) {
      for (const p of sel) {
        pops.push({ col: p.c, row: p.r, t: 0 });
        grid[p.r][p.c] = 0;
      }
      score += sel.length;
      scoreEl.textContent = score;
      const msg = sel.length >= 4
        ? BIG_CHEERS[Math.floor(Math.random() * BIG_CHEERS.length)]
        : CHEERS[Math.floor(Math.random() * CHEERS.length)];
      say(msg, 'happy');
    } else if (sel.length > 0) {
      say(sum > 10 ? '앗, ' + sum + '은 너무 많아…' : '음… ' + sum + '이면 부족해!', 'sad');
    }
    drag = null;
    draw();
  }

  canvas.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);

  function tick() {
    timeLeft--;
    timerLabel.textContent = timeLeft;
    timerFill.style.width = (timeLeft / TIME_LIMIT * 100) + '%';
    if (timeLeft === 30) say('30초 남았어! 서둘러!', 'sad');
    if (timeLeft <= 0) endGame();
  }

  function endGame() {
    running = false;
    clearInterval(timerId);
    drag = null;
    finalScoreEl.textContent = score;
    overlay.classList.remove('hidden');
    say(score >= 80 ? '와… ' + score + '점!? 전설이야!'
       : score >= 50 ? score + '점! 정말 잘했어!'
       : score + '점! 다음엔 더 잘할 수 있어!', 'happy');
  }

  function start() {
    newGrid();
    score = 0; timeLeft = TIME_LIMIT;
    pops = []; drag = null;
    scoreEl.textContent = '0';
    timerLabel.textContent = TIME_LIMIT;
    timerFill.style.width = '100%';
    overlay.classList.add('hidden');
    running = true;
    clearInterval(timerId);
    timerId = setInterval(tick, 1000);
    say('합이 10이 되게 모아줘!');
    draw();
  }

  document.getElementById('btnRestart').addEventListener('click', start);
  document.getElementById('btnAgain').addEventListener('click', start);
  faceImg.onload = draw;
  start();
})();
</script>
</body>
</html>
